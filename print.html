<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Tisk receptů</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
        }

        /* Stránka A4 na šířku */
        .print-page {
            width: 297mm;
            height: 210mm;
            page-break-after: always;
            box-sizing: border-box;
            padding: 10mm 12mm;
            display: flex;
            justify-content: space-between;
            background: white;
            position: relative;
        }

        @media print {
            body {
                -webkit-print-color-adjust: exact;
            }

            @page {
                size: A4 landscape;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }
        }

        /* Jednotlivá A5 kartička - design podle čisté předlohy */
        .recipe-card-print {
            width: 133mm;
            height: 190mm;
            border: 1px solid #111;
            padding: 6mm 6mm 5mm 14mm;
            /* Větší levý okraj pro děrovací kroužky */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* Moderní čistý font */
            position: relative;
            background: white;
        }

        /* Prázdná polovina papíru */
        .empty-card-print {
            width: 133mm;
            height: 190mm;
            border: 1px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-style: italic;
            font-family: Arial, sans-serif;
        }

        /* Vodící kroužky pro děrovačku (do šanonu) */
        /* Absolutně přesné kroužky podle zadaných rozměrů */
        .binder-holes {
            position: absolute;
            left: 4mm;
            top: -16mm;
            bottom: 0;
            width: 5mm;
        }

        .binder-hole {
            width: 4mm;
            height: 4mm;
            border: 1.5px solid #666;
            border-radius: 50%;
            position: absolute;
            left: 0;
        }

        /* Pozice podle rozměrů: 2.75cm, 2.75+4.5=7.25cm, 7.25+6.5=13.75cm, atd. */
        .binder-hole:nth-child(1) {
            top: 27.5mm;
        }

        .binder-hole:nth-child(2) {
            top: 72.5mm;
        }

        .binder-hole:nth-child(3) {
            top: 137.5mm;
        }

        .binder-hole:nth-child(4) {
            top: 182.5mm;
        }

        /* Zbývá 27.5mm do konce 210mm stránky */

        /* Záhlaví RECIPE CARD */
        .print-header {
            text-align: center;
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 3mm;
            color: #111;
        }

        /* Box pro název receptu */
        .print-title-box {
            border: 1px solid #111;
            padding: 2.5mm;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5mm;
            background: #fff;
        }

        /* Hlavní obsahový prostor */
        .print-content {
            display: flex;
            flex-grow: 1;
            border-bottom: 1px solid #111;
            margin-bottom: 3mm;
            overflow: hidden;
        }

        .print-ingredients {
            width: 44%;
            border-right: 1px solid #111;
            padding-right: 3mm;
        }

        .print-directions {
            width: 56%;
            padding-left: 4mm;
        }

        .print-section-title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 2mm;
            text-transform: uppercase;
            color: #333;
        }

        /* Linky na psaní/text */
        /* Zvýraznění linek, aby šly po tisku skvěle vidět */
        .print-line {
            border-bottom: 1px solid #999;
            /* Ztmaveno z #ddd na #999 */
            font-size: 11px;
            line-height: 19px;
            min-height: 19px;
            padding-left: 1px;
            white-space: normal;
            word-break: break-word;
            color: #111;
        }

        /* Box pro poznámky na dně karty */
        .print-notes-box {
            border: 1px solid #111;
            height: 18mm;
            padding: 1mm;
            position: relative;
            box-sizing: border-box;
        }

        .print-notes-title {
            font-size: 9px;
            text-align: center;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="no-print p-4 text-center bg-dark text-white">
        <h4>Generuji tiskové podklady...</h4>
        <p>Pro nejlepší výsledek v tiskovém dialogu zvolte orientaci <b>Na šířku (Landscape)</b> a vypněte okraje.</p>
        <button class="btn btn-warning" onclick="window.print()"><i class="fa-solid fa-print me-1"></i> Spustit
            tisk</button>
        <a href="index.html" class="btn btn-outline-light ms-2">Zpět do kuchařky</a>
    </div>

    <div id="pagesContainer"></div>

    <script>
        function generateLines(array, maxLines, prefixType = "none") {
            let html = "";
            let renderedLinesCount = 0;

            // Vykreslení reálného textu receptu
            for (let i = 0; i < array.length; i++) {
                if (array[i].trim() === "") continue;

                let prefix = "";
                if (prefixType === "bullet") prefix = "• ";
                if (prefixType === "number") prefix = `${i + 1}. `;

                html += `<div class="print-line">${prefix}${array[i].trim()}</div>`;
                renderedLinesCount++;
            }

            // Dotištění prázdných řádků do fixního počtu, aby karta vypadala jako šablona
            if (renderedLinesCount < maxLines) {
                for (let j = 0; j < (maxLines - renderedLinesCount); j++) {
                    html += `<div class="print-line">&nbsp;</div>`;
                }
            }
            return html;
        }

        const queue = JSON.parse(localStorage.getItem("printQueue")) || [];
        const container = document.getElementById("pagesContainer");

        if (queue.length === 0) {
            container.innerHTML = `<div class="p-5 text-center"><h3>Tisková fronta je prázdná.</h3><a href="index.html" class="btn btn-primary">Zpět</a></div>`;
        } else {
            let htmlPages = "";

            for (let i = 0; i < queue.length; i += 2) {
                const r1 = queue[i];
                const r2 = queue[i + 1];

                const r1Ing = r1.ingredients ? r1.ingredients.split(';') : [];
                const r1Inst = r1.instructions ? r1.instructions.split(';') : [];

                htmlPages += `<div class="print-page">`;

                // --- 1. RECEPT (Levá A5 kartička) ---
                htmlPages += `
                    <div class="recipe-card-print">
                        <div class="binder-holes">
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                        </div>
                        <div class="print-header">Recipe Card</div>
                        <div class="print-title-box">${r1.title}</div>
                        <div class="print-content">
                            <div class="print-ingredients">
                                <div class="print-section-title">Ingredients:</div>
                                ${generateLines(r1Ing, 17, "bullet")}
                            </div>
                            <div class="print-directions">
                                <div class="print-section-title">Directions:</div>
                                ${generateLines(r1Inst, 17, "number")}
                            </div>
                        </div>
                        <div class="print-notes-box"><div class="print-notes-title">Notes</div></div>
                    </div>
                `;

                // --- 2. RECEPT (Pravá A5 kartička nebo prázdné místo) ---
                if (r2) {
                    const r2Ing = r2.ingredients ? r2.ingredients.split(';') : [];
                    const r2Inst = r2.instructions ? r2.instructions.split(';') : [];

                    htmlPages += `
                        <div class="recipe-card-print">
                            <div class="binder-holes">
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                            </div>
                            <div class="print-header">Recipe Card</div>
                            <div class="print-title-box">${r2.title}</div>
                            <div class="print-content">
                                <div class="print-ingredients">
                                    <div class="print-section-title">Ingredients:</div>
                                    ${generateLines(r2Ing, 17, "bullet")}
                                </div>
                                <div class="print-directions">
                                    <div class="print-section-title">Directions:</div>
                                    ${generateLines(r2Inst, 17, "number")}
                                </div>
                            </div>
                            <div class="print-notes-box"><div class="print-notes-title">Notes</div></div>
                        </div>
                    `;
                } else {
                    htmlPages += `<div class="empty-card-print">Zde odstřihněte prázdnou A5 kartičku</div>`;
                }

                htmlPages += `</div>`;
            }

            container.innerHTML = htmlPages;

            // Spuštění tisku po vykreslení elementů
            setTimeout(() => {
                window.print();
            }, 600);
        }
    </script>
</body>

</html>
