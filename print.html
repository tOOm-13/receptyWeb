<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Tisk receptů</title>
    
    <!-- Google Fonts a Preconnect pro náhled -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- NÁHLED NA OBRAZOVCE (RODINNÉ BARVY) --- */
        body {
            background-color: #f5ece1 !important;
            margin: 0;
            padding: 0;
            color: #3d2314;
            font-family: 'Quicksand', sans-serif;
        }

        #pagesContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 10px;
            gap: 40px;
        }

        /* Stránka A4 na šířku (náhled v prohlížeči) */
        .print-page {
            width: 297mm;
            height: 210mm;
            box-sizing: border-box;
            padding: 10mm 12mm;
            display: flex;
            justify-content: space-between;
            background: white !important;
            position: relative;
            box-shadow: 0 15px 35px rgba(67, 20, 7, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Jednotlivá A5 kartička */
        .recipe-card-print {
            width: 133mm;
            height: 190mm;
            border: 2px solid #111;
            padding: 6mm 6mm 5mm 14mm;
            /* Větší levý okraj pro děrovací kroužky */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            position: relative;
            background: white !important;
            color: #111 !important;
        }

        /* Prázdná polovina papíru */
        .empty-card-print {
            width: 133mm;
            height: 190mm;
            border: 2px dashed #7c5843;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7c5843;
            font-style: italic;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Vodící kroužky pro děrovačku (do šanonu) */
        .binder-holes {
            position: absolute;
            left: 4mm;
            top: 0;
            bottom: 0;
            width: 5mm;
        }

        .binder-hole {
            width: 4mm;
            height: 4mm;
            border: 1.5px solid #666;
            border-radius: 50%;
            position: absolute;
            left: 0;
            background: white !important;
        }

        /* Pozice podle rozměrů: 2.75cm, 7.25cm, 13.75cm, 18.25cm */
        .binder-hole:nth-child(1) { top: 27.5mm; }
        .binder-hole:nth-child(2) { top: 72.5mm; }
        .binder-hole:nth-child(3) { top: 137.5mm; }
        .binder-hole:nth-child(4) { top: 182.5mm; }

        /* Záhlaví RECIPE CARD */
        .print-header {
            text-align: center;
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 3mm;
            color: #111 !important;
        }

        /* Box pro název receptu */
        .print-title-box {
            border: 2px solid #111;
            padding: 2.5mm;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5mm;
            background: #fff !important;
            color: #111 !important;
        }

        /* Hlavní obsahový prostor */
        .print-content {
            display: flex;
            flex-grow: 1;
            border-bottom: 2px solid #111;
            margin-bottom: 3mm;
            overflow: hidden;
            background: white !important;
        }

        .print-ingredients {
            width: 44%;
            border-right: 2px solid #111;
            padding-right: 3mm;
        }

        .print-directions {
            width: 56%;
            padding-left: 4mm;
        }

        .print-section-title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 2mm;
            text-transform: uppercase;
            color: #333 !important;
        }

        /* Linky na psaní/text */
        .print-line {
            border-bottom: 1px solid #999;
            font-size: 11px;
            line-height: 19px;
            min-height: 19px;
            padding-left: 1px;
            white-space: normal;
            word-break: break-word;
            color: #111 !important;
        }

        /* Box pro poznámky na dně karty */
        .print-notes-box {
            border: 2px solid #111;
            height: 18mm;
            padding: 1mm;
            position: relative;
            box-sizing: border-box;
            background: white !important;
        }

        .print-notes-title {
            font-size: 9px;
            text-align: center;
            color: #555 !important;
            font-weight: bold;
        }

        /* --- TISKOVÉ STYLY (VYUŽITY PŘI FYZICKÉM TISKU) --- */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }

            .no-print {
                display: none !important;
            }

            #pagesContainer {
                padding: 0 !important;
                gap: 0 !important;
                display: block !important;
            }

            .print-page {
                width: 297mm;
                height: 210mm;
                page-break-after: always;
                box-shadow: none !important;
                border-radius: 0 !important;
                padding: 10mm 12mm;
                margin: 0 !important;
                background: white !important;
            }

            .recipe-card-print {
                border: 2px solid #000 !important;
                background: white !important;
                color: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .binder-hole {
                border: 1.5px solid #000 !important;
                background: white !important;
            }

            .empty-card-print {
                border: 2px dashed #000 !important;
                background: white !important;
                color: #000 !important;
            }

            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <div class="no-print p-4 text-center navbar-custom text-dark border-bottom shadow-lg position-sticky top-0" style="z-index: 100;">
        <h4 class="fw-bold"><i class="fa-solid fa-print me-2 text-warning"></i>Tisková dílna kuchařky 🖨️</h4>
        <p class="text-secondary small mb-3">Pro nejlepší výsledek v tiskovém dialogu zvolte orientaci <b>Na šířku (Landscape)</b> a vypněte okraje (Margins: None).</p>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <button class="btn btn-gradient px-4" onclick="window.print()"><i class="fa-solid fa-print me-1"></i> Vytisknout receptíky</button>
            <a href="index.html" class="btn btn-glass-secondary">Zpět domů 🏠</a>
        </div>
    </div>

    <div id="pagesContainer"></div>

    <script>
        function generateLines(array, maxLines, prefixType = "none") {
            let html = "";
            let renderedLinesCount = 0;

            for (let i = 0; i < array.length; i++) {
                if (array[i].trim() === "") continue;

                let prefix = "";
                if (prefixType === "bullet") prefix = "• ";
                if (prefixType === "number") prefix = `${i + 1}. `;

                html += `<div class="print-line">${prefix}${array[i].trim()}</div>`;
                renderedLinesCount++;
            }

            if (renderedLinesCount < maxLines) {
                for (let j = 0; j < (maxLines - renderedLinesCount); j++) {
                    html += `<div class="print-line">&nbsp;</div>`;
                }
            }
            return html;
        }

        const queue = JSON.parse(localStorage.getItem("printQueue")) || [];
        const container = document.getElementById("pagesContainer");

        if (queue.length === 0) {
            container.innerHTML = `
                <div class="p-5 text-center bg-light rounded-4 m-5 shadow-sm text-secondary border border-2">
                    <i class="fa-solid fa-box-open fa-3x mb-3 text-warning"></i>
                    <h3 class="fw-bold">Tisková fronta je prázdná</h3>
                    <p class="small text-muted">Přidejte nejprve recepty z domovské stránky pomocí tlačítka tisku na kartách.</p>
                    <a href="index.html" class="btn btn-gradient mt-3">Zpět do kuchařky</a>
                </div>`;
        } else {
            let htmlPages = "";

            for (let i = 0; i < queue.length; i += 2) {
                const r1 = queue[i];
                const r2 = queue[i + 1];

                const r1Ing = r1.ingredients ? r1.ingredients.split(';') : [];
                const r1Inst = r1.instructions ? r1.instructions.split(';') : [];

                htmlPages += `<div class="print-page">`;

                // --- 1. RECEPT (Levá A5 kartička) ---
                htmlPages += `
                    <div class="recipe-card-print">
                        <div class="binder-holes">
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                        </div>
                        <div class="print-header">Recipe Card</div>
                        <div class="print-title-box">${r1.title}</div>
                        <div class="print-content">
                            <div class="print-ingredients">
                                <div class="print-section-title">Ingredients:</div>
                                ${generateLines(r1Ing, 17, "bullet")}
                            </div>
                            <div class="print-directions">
                                <div class="print-section-title">Directions:</div>
                                ${generateLines(r1Inst, 17, "number")}
                            </div>
                        </div>
                        <div class="print-notes-box"><div class="print-notes-title">Notes</div></div>
                    </div>
                `;

                // --- 2. RECEPT (Pravá A5 kartička nebo prázdné místo) ---
                if (r2) {
                    const r2Ing = r2.ingredients ? r2.ingredients.split(';') : [];
                    const r2Inst = r2.instructions ? r2.instructions.split(';') : [];

                    htmlPages += `
                        <div class="recipe-card-print">
                            <div class="binder-holes">
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                            </div>
                            <div class="print-header">Recipe Card</div>
                            <div class="print-title-box">${r2.title}</div>
                            <div class="print-content">
                                <div class="print-ingredients">
                                    <div class="print-section-title">Ingredients:</div>
                                    ${generateLines(r2Ing, 17, "bullet")}
                                </div>
                                <div class="print-directions">
                                    <div class="print-section-title">Directions:</div>
                                    ${generateLines(r2Inst, 17, "number")}
                                </div>
                            </div>
                            <div class="print-notes-box"><div class="print-notes-title">Notes</div></div>
                        </div>
                    `;
                } else {
                    htmlPages += `<div class="empty-card-print">Zde odstřihněte prázdnou A5 kartičku ✂️</div>`;
                }

                htmlPages += `</div>`;
            }

            container.innerHTML = htmlPages;

            // Automatické otevření tisku po krátké prodlevě
            setTimeout(() => {
                window.print();
            }, 800);
        }
    </script>
</body>

</html>
