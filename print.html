<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tisk receptů</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            background: #f3f4f6;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Stránka A4 na šířku (PC / Tablet) */
        .print-page {
            width: 297mm;
            height: 210mm;
            page-break-after: always;
            box-sizing: border-box;
            padding: 10mm 12mm;
            display: flex;
            justify-content: space-between;
            background: white;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        /* Jednotlivá A5 kartička - moderní rustikální & elegantní design */
        .recipe-card-print {
            width: 133mm;
            height: 190mm;
            border: 1px solid #1a1a1a;
            outline: 3px double #1a1a1a;
            outline-offset: -4px;
            padding: 6mm 6mm 5mm 15mm; /* Větší levý okraj pro děrovací kroužky */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: relative;
            background: white;
        }

        /* Prázdná polovina papíru */
        .empty-card-print {
            width: 133mm;
            height: 190mm;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-style: italic;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            background: #f8fafc;
        }

        /* Vodící kroužky pro děrovačku (do šanonu) */
        .binder-holes {
            position: absolute;
            left: 4.5mm;
            top: 0;
            bottom: 0;
            width: 5mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 27.5mm 0; /* Align perfectly with specified coordinates */
            box-sizing: border-box;
        }

        .binder-hole {
            width: 4.5mm;
            height: 4.5mm;
            border: 1px solid #94a3b8;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .binder-hole::after {
            content: '';
            width: 1.5mm;
            height: 1.5mm;
            background: #cbd5e1;
            border-radius: 50%;
        }

        /* Záhlaví RECIPE CARD */
        .print-header {
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2mm;
            color: #d97706; /* Elegant amber accent */
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Box pro název receptu */
        .print-title-box {
            text-align: center;
            font-size: 20px;
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4mm;
            color: #1a1a1a;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 3mm;
        }

        /* Hlavní obsahový prostor */
        .print-content {
            display: flex;
            flex-grow: 1;
            margin-bottom: 3mm;
            overflow: hidden;
            gap: 4mm;
        }

        .print-ingredients {
            width: 45%;
            border-right: 1px dashed #cbd5e1;
            padding-right: 2mm;
        }

        .print-directions {
            width: 55%;
            padding-left: 1mm;
        }

        .print-section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 2.5mm;
            text-transform: uppercase;
            color: #475569;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .print-section-title i {
            font-size: 10px;
            color: #94a3b8;
        }

        /* Linky na psaní/text */
        .print-line {
            border-bottom: 1px solid #e2e8f0;
            font-size: 11px;
            line-height: 19px;
            min-height: 19px;
            padding-left: 1px;
            white-space: normal;
            word-break: break-word;
            color: #334155;
            font-weight: 500;
        }
        
        .print-line.empty-line {
            border-bottom: 1px solid #f1f5f9;
        }

        /* Box pro poznámky na dně karty */
        .print-notes-box {
            border: 1px dashed #cbd5e1;
            background: #fafaf9;
            height: 18mm;
            padding: 1.5mm;
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .print-notes-title {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 1mm;
        }

        /* --- MOBILNÍ ZOBRAZENÍ PREVIEW --- */
        @media (max-width: 991px) {
            body {
                background: #f8fafc;
            }
            .print-page {
                width: 95%;
                height: auto;
                flex-direction: column;
                gap: 15px;
                padding: 15px;
                margin: 15px auto;
                border-radius: 12px;
                border: 1px solid #e2e8f0;
            }
            .recipe-card-print, .empty-card-print {
                width: 100%;
                height: auto;
                min-height: 190mm;
                padding: 6mm 6mm 5mm 15mm;
            }
            .empty-card-print {
                padding: 20px !important;
                height: 100px !important;
                min-height: auto !important;
            }
        }

        /* --- SKUTEČNÝ TISK (A4 LANDSCAPE) --- */
        @media print {
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .print-page {
                width: 297mm !important;
                height: 210mm !important;
                flex-direction: row !important;
                padding: 10mm 12mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                display: flex !important;
                justify-content: space-between !important;
                border: none !important;
                border-radius: 0 !important;
            }

            .recipe-card-print {
                width: 133mm !important;
                height: 190mm !important;
                padding: 6mm 6mm 5mm 15mm !important;
            }

            .empty-card-print {
                width: 133mm !important;
                height: 190mm !important;
                display: flex !important;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="no-print p-4 text-center bg-dark text-white shadow-sm">
        <h4 class="fw-bold mb-2">Tiskový náhled a příprava kuchařky</h4>
        <p class="text-white-50 small mb-3">Pro nejlepší výsledek v tiskovém dialogu zvolte orientaci <b>Na šířku (Landscape)</b> a v nastavení <b>vypněte okraje</b>.</p>
        <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-warning px-4 fw-bold shadow-sm" onclick="window.print()">
                <i class="fa-solid fa-print me-1"></i> Spustit tisk
            </button>
            <a href="index.html" class="btn btn-outline-light px-3">
                <i class="fa-solid fa-arrow-left me-1"></i> Zpět do kuchařky
            </a>
        </div>
    </div>

    <div id="pagesContainer"></div>

    <script>
        function generateLines(array, maxLines, prefixType = "none") {
            let html = "";
            let renderedLinesCount = 0;

            // Vykreslení reálného textu receptu
            for (let i = 0; i < array.length; i++) {
                if (array[i].trim() === "") continue;

                let prefix = "";
                if (prefixType === "bullet") prefix = "• ";
                if (prefixType === "number") prefix = `${i + 1}. `;

                html += `<div class="print-line">${prefix}${array[i].trim()}</div>`;
                renderedLinesCount++;
            }

            // Dotištění prázdných řádků do fixního počtu, aby karta vypadala jako šablona
            if (renderedLinesCount < maxLines) {
                for (let j = 0; j < (maxLines - renderedLinesCount); j++) {
                    html += `<div class="print-line empty-line">&nbsp;</div>`;
                }
            }
            return html;
        }

        const queue = JSON.parse(localStorage.getItem("printQueue")) || [];
        const container = document.getElementById("pagesContainer");

        if (queue.length === 0) {
            container.innerHTML = `
                <div class="p-5 text-center my-5 bg-white rounded shadow-sm max-width-md mx-auto" style="max-width: 500px;">
                    <i class="fa-solid fa-print text-muted fa-3x mb-3"></i>
                    <h3 class="fw-bold">Tisková fronta je prázdná</h3>
                    <p class="text-muted small">Přidejte nejprve recepty do tiskové fronty kliknutím na tiskárnu na kartách receptů.</p>
                    <a href="index.html" class="btn btn-primary mt-2">Zpět do kuchařky</a>
                </div>`;
        } else {
            let htmlPages = "";

            for (let i = 0; i < queue.length; i += 2) {
                const r1 = queue[i];
                const r2 = queue[i + 1];

                const r1Ing = r1.ingredients ? r1.ingredients.split(';') : [];
                const r1Inst = r1.instructions ? r1.instructions.split(';') : [];

                htmlPages += `<div class="print-page">`;

                // --- 1. RECEPT (Levá A5 kartička) ---
                htmlPages += `
                    <div class="recipe-card-print">
                        <div class="binder-holes">
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                        </div>
                        <div class="print-header">Rodinná Kuchařka</div>
                        <div class="print-title-box">${r1.title}</div>
                        <div class="print-content">
                            <div class="print-ingredients">
                                <div class="print-section-title"><i class="fa-solid fa-basket-shopping"></i> Suroviny:</div>
                                ${generateLines(r1Ing, 17, "bullet")}
                            </div>
                            <div class="print-directions">
                                <div class="print-section-title"><i class="fa-solid fa-kitchen-set"></i> Postup:</div>
                                ${generateLines(r1Inst, 17, "number")}
                            </div>
                        </div>
                        <div class="print-notes-box">
                            <div class="print-notes-title">Moje poznámky:</div>
                        </div>
                    </div>
                `;

                // --- 2. RECEPT (Pravá A5 kartička nebo prázdné místo) ---
                if (r2) {
                    const r2Ing = r2.ingredients ? r2.ingredients.split(';') : [];
                    const r2Inst = r2.instructions ? r2.instructions.split(';') : [];

                    htmlPages += `
                        <div class="recipe-card-print">
                            <div class="binder-holes">
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                            </div>
                            <div class="print-header">Rodinná Kuchařka</div>
                            <div class="print-title-box">${r2.title}</div>
                            <div class="print-content">
                                <div class="print-ingredients">
                                    <div class="print-section-title"><i class="fa-solid fa-basket-shopping"></i> Suroviny:</div>
                                    ${generateLines(r2Ing, 17, "bullet")}
                                </div>
                                <div class="print-directions">
                                    <div class="print-section-title"><i class="fa-solid fa-kitchen-set"></i> Postup:</div>
                                    ${generateLines(r2Inst, 17, "number")}
                                </div>
                            </div>
                            <div class="print-notes-box">
                                <div class="print-notes-title">Moje poznámky:</div>
                            </div>
                        </div>
                    `;
                } else {
                    htmlPages += `
                        <div class="empty-card-print">
                            <i class="fa-solid fa-scissors fa-2xl mb-3"></i>
                            <div>Zde odstřihněte prázdnou A5 kartičku</div>
                        </div>
                    `;
                }

                htmlPages += `</div>`;
            }

            container.innerHTML = htmlPages;

            // Spuštění tisku po vykreslení elementů
            setTimeout(() => {
                window.print();
            }, 600);
        }
    </script>
</body>

</html>
