<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tisk receptů</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            background: #f3f4f6;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Tisková lišta sladěná s GUI */
        .no-print {
            background: #0B0F19 !important; /* Shodná s tmavým režimem kuchařky */
            color: #F1F5F9 !important;
            border-bottom: 1px solid #1E293B;
        }

        .no-print h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }

        .no-print .btn-warning {
            background-color: #FF5A5F !important; /* Hlavní korálová barva kuchařky */
            border-color: #FF5A5F !important;
            color: white !important;
            font-weight: 700 !important;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 90, 95, 0.3);
        }

        .no-print .btn-warning:hover {
            background-color: #E0484D !important;
            border-color: #E0484D !important;
        }

        .no-print .btn-outline-light {
            border-color: #475569 !important;
            color: #94A3B8 !important;
            font-weight: 600;
        }

        .no-print .btn-outline-light:hover {
            background: #1E293B !important;
            color: #F1F5F9 !important;
        }

        /* Stránka A4 na šířku (PC / Tablet) */
        .print-page {
            width: 297mm;
            height: 210mm;
            page-break-after: always;
            box-sizing: border-box;
            padding: 5mm 6mm; /* Přesně 5mm horní/dolní okraj */
            display: flex;
            justify-content: space-between;
            background: white;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        /* Jednotlivá A5 kartička - zvětšená pro vyplnění plochy papíru */
        .recipe-card-print {
            margin-top: 2.5px;
            width: 140mm; /* Zvětšeno ze 133mm */
            height: 200mm; /* Zvětšeno ze 190mm */
            border: 1.5px solid #000000; /* Výraznější černý rámeček */
            outline: 3px double #000000;
            outline-offset: -4px;
            padding: 5mm 5mm 4mm 11mm; /* Zmenšené okraje (více místa pro obsah) */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: relative;
            background: white;
        }

        /* Prázdná polovina papíru (zcela neviditelná) */
        .empty-card-print {
            width: 140mm;
            height: 200mm;
            border: none !important;
            background: transparent !important;
        }

        /* Vodící kroužky pro děrovačku (do šanonu) - absolutně pozicované */
        .binder-holes {
            position: absolute;
            left: 3.5mm;
            top: 0;
            bottom: 0;
            width: 5mm;
        }

        .binder-hole {
            width: 4.5mm;
            height: 4.5mm;
            border: 1.5px solid #000000; /* Výraznější černá pro snadné děrování */
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 0;
        }
        
        .binder-hole::after {
            content: '';
            width: 1.5mm;
            height: 1.5mm;
            background: #000000;
            border-radius: 50%;
        }

        .binder-hole:nth-child(1) {
            top: 20.5mm; /* 27.5mm od vrchu A4 (mínus 5mm horní okraj stránky) */
        }

        .binder-hole:nth-child(2) {
            top: 65.5mm; /* 22.5mm + 45mm mezera */
        }

        .binder-hole:nth-child(3) {
            top: 130.5mm; /* 67.5mm + 65mm mezera */
        }

        .binder-hole:nth-child(4) {
            top: 175.5mm; /* 132.5mm + 45mm mezera */
        }

        /* Záhlaví RECIPE CARD */
        .print-header {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2mm;
            color: #92400e; /* Tmavší, kontrastnější jantarová */
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Box pro název receptu */
        .print-title-box {
            text-align: center;
            font-size: 20px;
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 800; /* Výraznější písmo */
            letter-spacing: 0.5px;
            margin-bottom: 4mm;
            color: #000000;
            border-bottom: 2px solid #000000; /* Výrazná linka pod názvem */
            padding-bottom: 2.5mm;
        }

        /* Hlavní obsahový prostor */
        .print-content {
            display: flex;
            flex-grow: 1;
            margin-bottom: 3mm;
            overflow: hidden;
            gap: 4mm;
        }

        .print-ingredients {
            width: 45%;
            border-right: 1.5px dashed #000000; /* Výrazná dělicí čára */
            padding-right: 2mm;
        }

        .print-directions {
            width: 55%;
            padding-left: 1mm;
        }

        .print-section-title {
            font-size: 11px;
            font-weight: 800; /* Extra bold */
            letter-spacing: 1px;
            margin-bottom: 2.5mm;
            text-transform: uppercase;
            color: #000000; /* Sytě černá */
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .print-section-title i {
            font-size: 10px;
            color: #000000; /* Černé ikony pro viditelnost */
        }

        /* Výrazné linky receptu a textu pro tisk */
        .print-line {
            border-bottom: 1.5px solid #000000; /* Tmavší a tlustší linka pro tiskárny */
            font-size: 11px;
            line-height: 19px;
            min-height: 19px;
            padding-left: 1px;
            white-space: normal;
            word-break: break-word;
            color: #000000; /* Sytá černá */
            font-weight: 700; /* Výrazné písmo na čtení */
        }
        
        .print-line.empty-line {
            border-bottom: 1px solid #444444; /* Výraznější prázdné řádky */
        }

        /* Box pro poznámky na dně karty */
        .print-notes-box {
            border: 1.5px dashed #000000; /* Kontrastní ohraničení */
            background: #ffffff;
            height: 18mm;
            padding: 1.5mm;
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .print-notes-title {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000; /* Kontrastní text */
            font-weight: 800;
            margin-bottom: 1mm;
        }

        /* --- MOBILNÍ ZOBRAZENÍ PREVIEW --- */
        @media (max-width: 991px) {
            body {
                background: #0B0F19; /* Tmavé pozadí pro mobilní preview tiskové fronty */
            }
            .print-page {
                width: 95%;
                height: auto;
                flex-direction: column;
                gap: 15px;
                padding: 15px;
                margin: 15px auto;
                border-radius: 12px;
                border: 1px solid #1E293B;
                background: #151D30; /* Sladěno s tmavým režimem webu */
            }
            .recipe-card-print, .empty-card-print {
                width: 100%;
                height: auto;
                min-height: 190mm;
                padding: 5mm 5mm 4mm 11mm;
            }
            .recipe-card-print {
                background: #ffffff; /* Fyzická karta zůstává pro čtení bílá */
                color: #000000;
            }
            .empty-card-print {
                padding: 20px !important;
                height: 100px !important;
                min-height: auto !important;
            }
        }

        /* --- SKUTEČNÝ TISK (A4 LANDSCAPE) --- */
        @media print {
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .print-page {
                width: 297mm !important;
                height: 210mm !important;
                flex-direction: row !important;
                padding: 5mm 6mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                display: flex !important;
                justify-content: space-between !important;
                border: none !important;
                border-radius: 0 !important;
                background: white !important;
            }

            .recipe-card-print {
                width: 140mm !important;
                height: 200mm !important;
                padding: 5mm 5mm 4mm 11mm !important;
            }

            .empty-card-print {
                width: 140mm !important;
                height: 200mm !important;
                display: flex !important;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="no-print p-4 text-center shadow-sm">
        <h4 class="mb-2">Tiskový náhled a příprava kuchařky</h4>
        <p class="text-white-50 small mb-3">Pro nejlepší výsledek v tiskovém dialogu zvolte orientaci <b>Na šířku (Landscape)</b> a v nastavení <b>vypněte okraje</b>.</p>
        <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-warning px-4 fw-bold shadow-sm" onclick="window.print()">
                <i class="fa-solid fa-print me-1"></i> Spustit tisk
            </button>
            <a href="index.html" class="btn btn-outline-light px-3">
                <i class="fa-solid fa-arrow-left me-1"></i> Zpět do kuchařky
            </a>
        </div>
    </div>

    <div id="pagesContainer"></div>

    <script>
        function generateLines(array, maxLines, prefixType = "none") {
            let html = "";
            let renderedLinesCount = 0;

            // Vykreslení reálného textu receptu
            for (let i = 0; i < array.length; i++) {
                if (array[i].trim() === "") continue;

                let prefix = "";
                if (prefixType === "bullet") prefix = "• ";
                if (prefixType === "number") prefix = `${i + 1}. `;

                html += `<div class="print-line">${prefix}${array[i].trim()}</div>`;
                renderedLinesCount++;
            }

            // Dotištění prázdných řádků do fixního počtu, aby karta vypadala jako šablona
            if (renderedLinesCount < maxLines) {
                for (let j = 0; j < (maxLines - renderedLinesCount); j++) {
                    html += `<div class="print-line empty-line">&nbsp;</div>`;
                }
            }
            return html;
        }

        const queue = JSON.parse(localStorage.getItem("printQueue")) || [];
        const container = document.getElementById("pagesContainer");

        if (queue.length === 0) {
            container.innerHTML = `
                <div class="p-5 text-center my-5 bg-white rounded shadow-sm max-width-md mx-auto" style="max-width: 500px; border: 1px solid #1E293B;">
                    <i class="fa-solid fa-print text-muted fa-3x mb-3"></i>
                    <h3 class="fw-bold text-dark">Tisková fronta je prázdná</h3>
                    <p class="text-muted small">Přidejte nejprve recepty do tiskové fronty kliknutím na tiskárnu na kartách receptů.</p>
                    <a href="index.html" class="btn btn-warning mt-2 fw-bold text-white px-4" style="background-color: #FF5A5F; border-color: #FF5A5F;">Zpět do kuchařky</a>
                </div>`;
        } else {
            let htmlPages = "";

            for (let i = 0; i < queue.length; i += 2) {
                const r1 = queue[i];
                const r2 = queue[i + 1];

                const r1Ing = r1.ingredients ? r1.ingredients.split(';') : [];
                const r1Inst = r1.instructions ? r1.instructions.split(';') : [];

                htmlPages += `<div class="print-page">`;

                // --- 1. RECEPT (Levá A5 kartička) ---
                htmlPages += `
                    <div class="recipe-card-print">
                        <div class="binder-holes">
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                            <div class="binder-hole"></div>
                        </div>
                        <div class="print-header">Rodinná Kuchařka</div>
                        <div class="print-title-box">${r1.title}</div>
                        <div class="print-content">
                            <div class="print-ingredients">
                                <div class="print-section-title"><i class="fa-solid fa-basket-shopping"></i> Suroviny:</div>
                                ${generateLines(r1Ing, 17, "bullet")}
                            </div>
                            <div class="print-directions">
                                <div class="print-section-title"><i class="fa-solid fa-kitchen-set"></i> Postup:</div>
                                ${generateLines(r1Inst, 17, "number")}
                            </div>
                        </div>
                        <div class="print-notes-box">
                            <div class="print-notes-title">Moje poznámky:</div>
                        </div>
                    </div>
                `;

                // --- 2. RECEPT (Pravá A5 kartička nebo prázdné místo) ---
                if (r2) {
                    const r2Ing = r2.ingredients ? r2.ingredients.split(';') : [];
                    const r2Inst = r2.instructions ? r2.instructions.split(';') : [];

                    htmlPages += `
                        <div class="recipe-card-print">
                            <div class="binder-holes">
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                                <div class="binder-hole"></div>
                            </div>
                            <div class="print-header">Rodinná Kuchařka</div>
                            <div class="print-title-box">${r2.title}</div>
                            <div class="print-content">
                                <div class="print-ingredients">
                                    <div class="print-section-title"><i class="fa-solid fa-basket-shopping"></i> Suroviny:</div>
                                    ${generateLines(r2Ing, 17, "bullet")}
                                </div>
                                <div class="print-directions">
                                    <div class="print-section-title"><i class="fa-solid fa-kitchen-set"></i> Postup:</div>
                                    ${generateLines(r2Inst, 17, "number")}
                                </div>
                            </div>
                            <div class="print-notes-box">
                                <div class="print-notes-title">Moje poznámky:</div>
                            </div>
                        </div>
                    `;
                } else {
                    htmlPages += `
                        <div class="empty-card-print">
                        </div>
                    `;
                }

                htmlPages += `</div>`;
            }

            container.innerHTML = htmlPages;

            // Spuštění tisku po vykreslení elementů
            setTimeout(() => {
                window.print();
            }, 600);
        }
    </script>
</body>

</html>
