<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail receptu</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-theme");
        }
    </script>

    <!-- STICKY HEADER -->
    <nav class="navbar sticky-top">
        <div class="container px-3">
            <a class="btn btn-outline-secondary btn-sm d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-chevron-left me-1"></i> Zpět
            </a>
            <span class="navbar-brand fw-bold mx-auto text-truncate" id="navTitle" style="max-width: 60%;">Načítám...</span>
            <button id="themeToggleBtn" class="btn btn-link theme-toggle-btn p-1" onclick="toggleTheme()" title="Přepnout tmavý režim" style="font-size: 20px; text-decoration: none; border: none; box-shadow: none;">
                <i class="fa-solid fa-moon text-dark"></i>
            </button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container my-4 px-3" id="recipeDetailContainer">
        <div class="text-center my-5">
            <div class="spinner-border text-danger" role="status"></div>
        </div>
    </div>

    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzk3fELy7sIuMoFTeZKSZ9aFkRZf-dAgMYopGnpx-psw7T05cYdy6FQGtPFFY1Y3b1r/exec";

        async function loadRecipeDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const recipeId = Number(urlParams.get('id'));
            const container = document.getElementById('recipeDetailContainer');

            try {
                const response = await fetch(API_URL);
                const recipes = await response.json();

                const recipe = recipes.find(r => Number(r.id) === recipeId);

                if (!recipe) {
                    container.innerHTML = `<div class="alert alert-danger border-0 rounded-3 shadow-sm text-center p-4"><i class="fa-solid fa-circle-xmark text-danger fa-2xl mb-3 d-block"></i>Recept nebyl nalezen.</div>`;
                    return;
                }

                document.getElementById('navTitle').innerText = recipe.title;

                function getFullCategoryName(cat) {
                    if (!cat) return "Neznámé";
                    const cleanCat = cat.trim().toUpperCase();
                    switch (cleanCat) {
                        case "S": return "Snídaně";
                        case "P": return "Polévky";
                        case "H": return "Hlavní jídla";
                        case "PR": return "Přílohy";
                        case "Z": return "Zákusky";
                        default: return cat;
                    }
                }

                const fullCategory = getFullCategoryName(recipe.category);

                const ingredientsHtml = recipe.ingredients
                    ? recipe.ingredients.split(';').map(ing => `
                        <li class="list-group-item py-3 px-3 d-flex align-items-center border-0 border-bottom">
                            <input class="form-check-input me-3 border-secondary" type="checkbox" style="width: 20px; height: 20px; cursor: pointer;">
                            <span class="fs-6 text-dark">${ing.trim()}</span>
                        </li>`).join('')
                    : '<li class="list-group-item text-muted">Žádné ingredience nebyly zadány.</li>';

                const instructionsHtml = recipe.instructions
                    ? recipe.instructions.split(';').map((inst, index) => `
                        <div class="step-card d-flex align-items-start shadow-sm">
                            <span class="badge bg-danger rounded-circle me-3 mt-1 d-flex align-items-center justify-content-center" style="width: 28px; height: 28px; min-width: 28px; font-size: 14px; font-weight: 700;">${index + 1}</span>
                            <p class="mb-0 fs-6 text-dark" style="line-height: 1.6;">${inst.trim()}</p>
                        </div>`).join('')
                    : '<p class="text-muted">Žádný postup nebyl zadán.</p>';

                container.innerHTML = `
                    <div class="row g-4">
                        <div class="col-12 col-md-5">
                            <div class="position-relative">
                                <img src="${recipe.image}" class="img-fluid w-100 recipe-hero-img" alt="${recipe.title}">
                                <span class="recipe-meta-badge">${fullCategory}</span>
                            </div>
                        </div>
                        
                        <div class="col-12 col-md-7">
                            <h1 class="display-6 fw-extrabold text-dark mb-4 text-center text-md-start" style="letter-spacing: -1px; font-weight: 800;">${recipe.title}</h1>
                            
                            <h4 class="fw-bold text-dark border-bottom pb-2 mb-3 d-flex align-items-center justify-content-center justify-content-md-start">
                                <i class="fa-solid fa-basket-shopping text-danger me-2"></i> Ingredience
                            </h4>
                            <ul class="list-group list-group-flush mb-4 shadow-sm rounded-3 overflow-hidden border">
                                ${ingredientsHtml}
                            </ul>
                            
                            <h4 class="fw-bold text-dark border-bottom pb-2 mb-3 d-flex align-items-center justify-content-center justify-content-md-start">
                                <i class="fa-solid fa-kitchen-set text-danger me-2"></i> Postup přípravy
                            </h4>
                            <div class="px-1">
                                ${instructionsHtml}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="alert alert-danger">Chyba při načítání detailu receptu.</div>`;
            }
        }

        loadRecipeDetail();

        function toggleTheme() {
            const isDark = document.body.classList.toggle("dark-theme");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            updateThemeIcon(isDark);
        }
        function updateThemeIcon(isDark) {
            const icon = document.querySelector("#themeToggleBtn i");
            if (icon) {
                if (isDark) {
                    icon.className = "fa-solid fa-sun text-warning";
                } else {
                    icon.className = "fa-solid fa-moon text-dark";
                }
            }
        }
        document.addEventListener("DOMContentLoaded", () => {
            const isDark = document.body.classList.contains("dark-theme");
            updateThemeIcon(isDark);
        });
    </script>
</body>

</html>
