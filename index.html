<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodinná Kuchařka</title>
    
    <!-- Google Fonts a Preconnect pro rodinná písma -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/webfonts/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top shadow-sm">
        <div class="container-fluid px-3">
            <span class="navbar-brand navbar-brand-gradient">
                <i class="fa-solid fa-drumstick-bite me-2"></i>Rodinná Kuchařka 🍳
            </span>

            <!-- Ovládání velikosti písma pro mobil -->
            <div class="d-flex gap-1 ms-auto d-lg-none align-items-center">
                <div class="font-controller-container me-1" id="fontControllerMobile">
                    <button class="font-btn" onclick="changeFontSize('sm')" id="btnFontSmMobile" title="Malé písmo">A-</button>
                    <button class="font-btn active" onclick="changeFontSize('md')" id="btnFontMdMobile" title="Střední písmo">A</button>
                    <button class="font-btn" onclick="changeFontSize('lg')" id="btnFontLgMobile" title="Velké písmo">A+</button>
                </div>
                <button id="clearPrintBtnMobile" class="btn btn-glass-secondary btn-sm d-none" onclick="clearPrintQueue()" title="Vyčistit tiskovou frontu">
                    <i class="fa-solid fa-trash-can text-danger"></i>
                </button>
                <a href="print.html" id="printNavBtnMobile" class="btn btn-glass-secondary btn-sm d-none">
                    <i class="fa-solid fa-print text-warning"></i>
                </a>
                <button class="btn btn-gradient btn-sm" data-bs-toggle="modal" data-bs-target="#addRecipeModal">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <button class="navbar-toggler border-0 ms-2" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-3 mb-lg-0 pt-2 pt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" aria-current="page" href="index.html">🏠 Domů</a>
                    </li>
                    <li class="nav-item">
                        <a id="favoritesLink" class="nav-link fw-bold" href="#">
                            <i class="fa-solid fa-heart text-danger me-1"></i>Oblíbené ❤️
                        </a>
                    </li>
                </ul>

                <div class="d-flex gap-2 align-items-center">
                    <!-- Ovládání velikosti písma pro počítač -->
                    <div class="font-controller-container me-2" id="fontController">
                        <button class="font-btn" onclick="changeFontSize('sm')" id="btnFontSm" title="Malé písmo">A-</button>
                        <button class="font-btn active" onclick="changeFontSize('md')" id="btnFontMd" title="Střední písmo">A</button>
                        <button class="font-btn" onclick="changeFontSize('lg')" id="btnFontLg" title="Velké písmo">A+</button>
                    </div>
                    
                    <button id="clearPrintBtn" class="btn btn-glass-secondary btn-sm d-none" onclick="clearPrintQueue()">
                        <i class="fa-solid fa-trash-can me-1 text-danger"></i> Vyčistit frontu
                    </button>
                    <a href="print.html" id="printNavBtn" class="btn btn-glass-secondary btn-sm d-none">
                        <i class="fa-solid fa-print me-1 text-warning"></i> Tisková fronta (0)
                    </a>
                    <button class="btn btn-gradient d-none d-lg-block" data-bs-toggle="modal"
                        data-bs-target="#addRecipeModal">
                        <i class="fa-solid fa-plus me-1"></i>Nový recept
                    </button>
                    <form class="d-flex m-0" role="search" onsubmit="return false;">
                        <input id="searchInput" class="form-control form-control-custom" type="search" placeholder="Hledat recept...">
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 px-3">
        <h1 class="display-5 fw-bold mb-1">Rodinná kuchařka 🍳</h1>
        <p class="text-secondary small mb-0">
            Aktuální filtr: <span id="currentCategory" class="badge bg-light text-dark border text-uppercase px-2 py-1 ms-1 fw-bold">Všechny recepty</span>
        </p>
    </div>

    <div class="container px-3">
        <div class="filter-scroll-container">
            <div class="filter-badge active active-category" data-category="all">🍳 Vše</div>
            <div class="filter-badge" data-category="Snídaně">🥞 Snídaně</div>
            <div class="filter-badge" data-category="Polévky">🍜 Polévky</div>
            <div class="filter-badge" data-category="Hlavní jídla">🍗 Hlavní jídla</div>
            <div class="filter-badge" data-category="Přílohy">🥔 Přílohy</div>
            <div class="filter-badge" data-category="Zákusky">🍰 Zákusky</div>
            <div class="filter-badge" id="mobileFavoritesBtn" data-category="favorites">❤️ Oblíbené</div>
        </div>
    </div>

    <div class="container my-3 px-2">
        <div id="recipesContainer" class="row g-3 row-cols-2 row-cols-md-3 row-cols-lg-4">
            <!-- Výchozí animované skeletony před načtením dat -->
            <div class="col">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line" style="width: 45%; height: 14px;"></div>
                        <div class="skeleton-line" style="width: 80%; height: 20px;"></div>
                        <div class="skeleton-line" style="width: 100%; height: 35px; margin-top: auto;"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line" style="width: 35%; height: 14px;"></div>
                        <div class="skeleton-line" style="width: 70%; height: 20px;"></div>
                        <div class="skeleton-line" style="width: 100%; height: 35px; margin-top: auto;"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line" style="width: 50%; height: 14px;"></div>
                        <div class="skeleton-line" style="width: 85%; height: 20px;"></div>
                        <div class="skeleton-line" style="width: 100%; height: 35px; margin-top: auto;"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line" style="width: 40%; height: 14px;"></div>
                        <div class="skeleton-line" style="width: 75%; height: 20px;"></div>
                        <div class="skeleton-line" style="width: 100%; height: 35px; margin-top: auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODÁL: PŘIDÁNÍ RECEPTU -->
    <div class="modal fade" id="addRecipeModal" tabindex="-1" aria-labelledby="addRecipeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header modal-header-custom">
                    <h5 class="modal-title fw-bold" id="addRecipeModalLabel">✍️ Přidat nový recept</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addRecipeForm">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label for="recipeTitle" class="form-label-custom">Název receptu</label>
                            <input type="text" class="form-control form-control-custom" id="recipeTitle" required
                                placeholder="Např. Babiččin štrúdl" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="recipeCategory" class="form-label-custom">Kategorie</label>
                            <select class="form-select form-control-custom" id="recipeCategory" required>
                                <option value="Snídaně">🥞 Snídaně</option>
                                <option value="Polévky">🍜 Polévky</option>
                                <option value="Hlavní jídla" selected>🍗 Hlavní jídla</option>
                                <option value="Přílohy">🥔 Přílohy</option>
                                <option value="Zákusky">🍰 Zákusky</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="recipeImage" class="form-label-custom">Odkaz na obrázek (URL)</label>
                            <input type="url" class="form-control form-control-custom" id="recipeImage" required
                                placeholder="https://domena.cz/obrazek.jpg">
                        </div>
                        <div class="mb-3">
                            <label for="recipeIngredients" class="form-label-custom">Ingredience (odděluj středníkem `;` než to uložíš)</label>
                            <textarea class="form-control form-control-custom" id="recipeIngredients" rows="2" required
                                placeholder="mouka 500g; 2 vejce; mléko 1l"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="recipeInstructions" class="form-label-custom">Postup přípravy (odděluj středníkem `;` pro jednotlivé kroky)</label>
                            <textarea class="form-control form-control-custom" id="recipeInstructions" rows="3" required
                                placeholder="Smíchej suroviny; Upeč v troubě na 180°C"></textarea>
                        </div>
                        
                        <div class="pin-input-container">
                            <label for="recipePin" class="form-label-custom text-danger d-flex align-items-center gap-2">
                                🔒 Rodinný PIN kód pro zápis
                            </label>
                            <input type="password" class="form-control form-control-custom text-center fw-bold fs-4 mt-1" id="recipePin" required
                                placeholder="••••" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
                        </div>
                    </div>
                    <div class="modal-footer modal-footer-custom d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-glass-secondary" data-bs-dismiss="modal">Zrušit</button>
                        <button type="submit" id="submitBtn" class="btn btn-gradient">
                            <span id="btnText">Uložit do kuchařky</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODÁL: SMAZÁNÍ RECEPTU -->
    <div class="modal fade" id="deletePinModal" tabindex="-1" aria-labelledby="deletePinModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header modal-header-custom bg-danger-subtle text-danger">
                    <h6 class="modal-title fw-bold" id="deletePinModalLabel">
                        🗑️ Opravdu smazat recept?
                    </h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="deleteRecipeForm">
                    <div class="modal-body text-center p-4">
                        <p class="text-secondary small mb-3">Tato akce se nedá vrátit zpět. Napište rodinný PIN kód:</p>
                        <div class="pin-input-container">
                            <input type="password" class="form-control form-control-custom text-center fw-bold fs-4" id="deletePinInput" required
                                placeholder="••••" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
                        </div>
                    </div>
                    <div class="modal-footer modal-footer-custom d-flex justify-content-between">
                        <button type="button" class="btn btn-glass-secondary btn-sm" data-bs-dismiss="modal">Zrušit</button>
                        <button type="submit" id="deleteSubmitBtn" class="btn btn-danger btn-sm px-4 fw-bold rounded-pill">Smazat</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
